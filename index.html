<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PokerFlow</title>
  <style>
    :root{
      /* AJUSTA ESTO A OJO */
      --chip-size: 320px;

      --eye-w: 86px;      /* blanco del ojo */
      --eye-h: 46px;
      --pupil: 18px;      /* tamaño pupila */
      --pupil-max: 10px;  /* cuánto se mueve */

      /* Posición de cada ojo dentro del chip (en px) */
      --eyeL-x: 96px;
      --eyeL-y: 136px;

      --eyeR-x: 186px;
      --eyeR-y: 136px;
    }

    body{
      margin:0;
      height:100vh;
      display:grid;
      place-items:center;
      background: radial-gradient(1200px 700px at 50% 20%, #141a22, #0b0f14 70%);
      color:white;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    }

    .wrap{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:18px;
    }

    .chip{
      position:relative;
      width:var(--chip-size);
      height:var(--chip-size);
      user-select:none;
    }

    .chip img{
      width:100%;
      height:100%;
      display:block;
      position:relative;
      z-index:3;
      pointer-events:none;
    }

    /* Si tus ojos son TRANSPARENTES: deja el blanco visible.
       Si NO son transparentes todavía, pon opacity:0; para no ver el blanco. */
    .eye{
      position:absolute;
      width:var(--eye-w);
      height:var(--eye-h);
      background:#fff;
      border-radius:999px;
      overflow:hidden;
      z-index:2;
      /* Si AÚN no has hecho los ojos transparentes, descomenta esto: */
      /* opacity: 0; */
    }

    .eye.left{ left:var(--eyeL-x); top:var(--eyeL-y); }
    .eye.right{ left:var(--eyeR-x); top:var(--eyeR-y); }

    .pupil{
      position:absolute;
      width:var(--pupil);
      height:var(--pupil);
      background:#111;
      border-radius:999px;
      left:50%;
      top:50%;
      transform: translate(-50%,-50%);
    }

    h1{
      margin:0;
      letter-spacing:.2px;
      font-weight:800;
    }

    p{
      margin:0;
      opacity:.75;
      font-size:14px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="chip" id="chip">
      <div class="eye left"><div class="pupil"></div></div>
      <div class="eye right"><div class="pupil"></div></div>
      <img src="chip.png" alt="PokerFlow chip" />
    </div>

    <div style="text-align:center">
      <h1>PokerFlow</h1>
      <p>From zero to flow.</p>
    </div>
  </div>

  <script>
    const pupils = document.querySelectorAll(".pupil");

    function clamp(n, min, max){ return Math.max(min, Math.min(max, n)); }

    document.addEventListener("mousemove", (e) => {
      pupils.forEach(pupil => {
        const eye = pupil.parentElement;
        const r = eye.getBoundingClientRect();
        const cx = r.left + r.width/2;
        const cy = r.top + r.height/2;

        const dx = e.clientX - cx;
        const dy = e.clientY - cy;

        const dist = Math.sqrt(dx*dx + dy*dy) || 1;
        const max = parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--pupil-max")) || 10;

        const x = clamp((dx/dist) * max, -max, max);
        const y = clamp((dy/dist) * max, -max, max);

        pupil.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
      });
    });
  </script>
</body>
</html>
